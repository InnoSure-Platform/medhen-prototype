syntax = "proto3";

package medhen.product.v1;

option go_package = "github.com/medhen/pc-contracts/gen/go/product/v1;productpb";

service ProductQueryService {
  rpc GetEffectiveProduct (GetEffectiveProductRequest) returns (GetEffectiveProductResponse);
}

message GetEffectiveProductRequest {
  string tenant_id = 1;
  string product_id = 2;
  int64 target_timestamp = 3;
}

message GetEffectiveProductResponse {
  string id = 1;
  string code = 2;
  string name = 3;
  int32 version = 4;
  repeated Coverage coverages = 5;
}

message Coverage {
  string code = 1;
  string name = 2;
  bool is_mandatory = 3;
}
