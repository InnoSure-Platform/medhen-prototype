apiVersion: apps/v1
kind: Deployment
metadata:
  name: pc-workflow-svc
  labels:
    app: pc-workflow-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pc-workflow-svc
  template:
    metadata:
      labels:
        app: pc-workflow-svc
    spec:
      containers:
        - name: pc-workflow-svc
          image: medhen/pc-workflow-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          envFrom:
            - configMapRef:
                name: pc-workflow-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pc-workflow-worker
  labels:
    app: pc-workflow-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pc-workflow-worker
  template:
    metadata:
      labels:
        app: pc-workflow-worker
    spec:
      containers:
        - name: pc-workflow-worker
          image: medhen/pc-workflow-svc:latest
          command: ["./worker"]
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pc-workflow-config
