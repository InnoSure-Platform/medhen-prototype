apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: medhen-gateway
  namespace: default
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "api.medhen.local"
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "api.medhen.local"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: medhen-tls-secret
      allowedRoutes:
        namespaces:
          from: Same
