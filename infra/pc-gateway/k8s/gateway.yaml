apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: medhen-gateway
  namespace: default
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "api.medhen.local"
      allowedRoutes:
        namespaces:
          from: Same
