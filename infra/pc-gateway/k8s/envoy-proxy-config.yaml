apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: medhen-envoy-proxy
  namespace: default
spec:
  telemetry:
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              start_time: "%START_TIME%"
              method: "%REQ(:METHOD)%"
              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              protocol: "%PROTOCOL%"
              response_code: "%RESPONSE_CODE%"
              duration: "%DURATION%"
              upstream_host: "%UPSTREAM_HOST%"
              user_id: "%REQ(x-user-id)%"
          sinks:
            - type: File
              file:
                path: /dev/stdout
    tracing:
      provider:
        type: OpenTelemetry
        backendRefs:
          - name: otel-collector
            namespace: default
            port: 4317
