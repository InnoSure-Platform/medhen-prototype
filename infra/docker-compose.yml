# Medhen Platform — local integration backbone (Phase 0)
# Stack aligned to ADR-PC-020 principles (PG 18, Kafka/KRaft, Valkey, Apache Ozone, Keycloak, OTel, Mimir, Loki, Tempo).
# Phase 0 simplifies: single-node Kafka, Valkey, PG, Ozone, Keycloak, Observability Stack.

name: medhen

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: medhen
      POSTGRES_PASSWORD: medhen
      POSTGRES_DB: medhen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U medhen -d medhen" ]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "19092:19092"
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:0.0.0.0:19092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - CLUSTER_ID=4L6g3nShT-eMCtK--X86sw

  #   ozone:
  #     image: apache/ozone:1.4.0
  #     ports:
  #       - "9878:9878"
  #       - "9862:9862"

  #   iceberg-rest:
  #     image: tabulario/iceberg-rest-image:latest
  #     ports:
  #       - "8181:8181"
  #     environment:
  #       - CATALOG_WAREHOUSE=s3://warehouse/
  #       - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
  #       - CATALOG_S3_ENDPOINT=http://ozone:9878

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: [ "start-dev", "--import-realm" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8081
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-medhen.json:/opt/keycloak/data/import/realm-medhen.json:ro
    ports:
      - "8081:8081"

