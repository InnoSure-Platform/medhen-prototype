name: Medhen Platform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Patched toolchain: fixes the go1.26.2 net/http stdlib advisories flagged by
  # govulncheck (which is a blocking gate below).
  GO_VERSION: '1.26.3'

jobs:
  # --- Security gates ------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (working tree)
        # Scans the current tree for secrets. NOTE: run in --no-git mode until
        # scripts/scrub-secrets-history.sh has purged historical secrets; after
        # that, drop --no-git to also scan full history.
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --no-git --source . --redact --verbose

  vuln-scan:
    runs-on: ubuntu-latest
    # Blocking (Phase 7): fails on any vulnerability reachable from our code.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    # Blocking (Phase 7). Config: .golangci.yml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

  arch-lint:
    runs-on: ubuntu-latest
    # Blocking (Phase 7): enforces sealed-module boundaries (.go-arch-lint.yml).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go-arch-lint check
        run: |
          go install github.com/fe3dback/go-arch-lint@v1.16.0
          "$(go env GOPATH)/bin/go-arch-lint" check --project-path .

  trivy-fs:
    runs-on: ubuntu-latest
    # Vuln + secret scanning is blocking; misconfig (K8s/Docker) is reported only
    # until the Phase 8 infra hardening lands.
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (vuln, secret)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Trivy misconfig (report-only — Phase 8)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          severity: CRITICAL,HIGH
          exit-code: '0'

  # --- Build & test --------------------------------------------------------
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build & vet
        run: go build ./... && go vet ./...
      - name: Tests + coverage (unit + testcontainers integration)
        # ubuntu-latest ships Docker, so testcontainers (Postgres/Redis) works.
        # -coverpkg attributes cross-package coverage (e.g. an adapter test that
        # exercises its module's app/domain code).
        run: go test -race -coverpkg=./internal/... -coverprofile=coverage.out ./...
      - name: Coverage gate (per-layer floors)
        run: bash scripts/coverage-check.sh coverage.out

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: cd web && npm ci
      - name: Typecheck
        run: cd web && npx tsc --noEmit
      - name: Build Next.js
        run: cd web && npm run build
        env:
          # CI-only placeholder secrets so the fail-closed auth config can build.
          KEYCLOAK_SECRET: ci-placeholder
          NEXTAUTH_SECRET: ci-placeholder
          KEYCLOAK_ISSUER: http://localhost:8081/realms/medhen

  docker-build:
    needs: [secret-scan, vuln-scan, lint, arch-lint, trivy-fs, test-go, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Medhen Platform Docker image
        run: docker build -t innosure/medhen-platform:latest .
