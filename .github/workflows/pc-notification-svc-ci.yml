name: pc-notification-svc CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/pc-notification-svc/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/pc-notification-svc/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/pc-notification-svc
        
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Run Tests
      run: go test -v ./...

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./services/pc-notification-svc
        push: false
        tags: pc-notification-svc:test
        outputs: type=docker,dest=/tmp/pc-notification-svc.tar

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        input: /tmp/pc-notification-svc.tar
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # Zot Push and Cosign steps would follow here using OIDC
