syntax = "proto3";

package medhen.party.v1;

option go_package = "github.com/medhen/pc-contracts/gen/go/party/v1;partypb";

service PartyResolutionService {
  rpc ResolveParty (ResolvePartyRequest) returns (PartySummary);
  rpc VerifyKYCState (VerifyKYCStateRequest) returns (KYCStatusResponse);
}

message ResolvePartyRequest {
  string tenant_id = 1;
  string party_id = 2;
}

message PartySummary {
  string id = 1;
  string type = 2; // INDIVIDUAL, ORGANIZATION
  string first_name = 3;
  string last_name = 4;
  string legal_name = 5;
  string status = 6;
  string primary_phone = 7;
  string primary_email = 8;
}

message VerifyKYCStateRequest {
  string tenant_id = 1;
  string party_id = 2;
}

message KYCStatusResponse {
  string status = 1; // VERIFIED, PENDING, REJECTED, EXPIRED
}
