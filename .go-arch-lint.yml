# Architecture boundary rules for the modular monolith, enforced by go-arch-lint
# (https://github.com/fe3dback/go-arch-lint). Run: go-arch-lint check
#
# Intent (see docs/refactor/modular-monolith-plan.md §3):
#   - modules are sealed: no module imports another module's internals
#   - the domain layer of a module depends only on the shared platform kernel
#   - everything may depend on internal/platform/*
#
# As bounded contexts migrate into internal/modules/<name> (Phase 3), add a
# component + dependency rule per module. The scaffolding below covers the
# platform kernel and composition root that exist today.
version: 3
workdir: .

components:
  platform:
    in: internal/platform/**
  app-kernel:
    in: internal/app
  cmd:
    in: cmd/**
  module-rating:
    in: internal/modules/rating/**
  module-party:
    in: internal/modules/party/**
  module-product:
    in: internal/modules/product/**
  module-underwriting:
    in: internal/modules/underwriting/**
  module-policy:
    in: internal/modules/policy/**
  module-billing:
    in: internal/modules/billing/**
  module-claims:
    in: internal/modules/claims/**
  module-audit:
    in: internal/modules/audit/**
  module-integration:
    in: internal/modules/integration/**
  module-notification:
    in: internal/modules/notification/**
  module-document:
    in: internal/modules/document/**
  module-reporting:
    in: internal/modules/reporting/**
  module-iam:
    in: internal/modules/iam/**
  # All 13 bounded contexts migrated (Phase 3 complete).

deps:
  platform:
    mayDependOn:
      - platform
  app-kernel:
    mayDependOn:
      - platform
  cmd:
    mayDependOn:
      - platform
      - app-kernel
      - module-rating
      - module-party
      - module-product
      - module-underwriting
      - module-policy
      - module-billing
      - module-claims
      - module-audit
      - module-integration
      - module-notification
      - module-document
      - module-reporting
      - module-iam
  module-rating:
    mayDependOn:
      - platform
      - app-kernel
      # NB: may depend on OTHER modules' `ports` packages only (added per pair
      # as cross-module calls appear, e.g. policy → rating/ports).
  module-party:
    mayDependOn:
      - platform
      - app-kernel
  module-product:
    mayDependOn:
      - platform
      - app-kernel
      - module-rating # implements rating/ports.RateTableProvider (cross-module)
  module-underwriting:
    mayDependOn:
      - platform
      - app-kernel
  module-policy:
    mayDependOn:
      - platform
      - app-kernel
      - module-rating       # consumes rating/ports.Calculator
      - module-party        # consumes party/ports.Reader
      - module-underwriting # consumes underwriting/ports.Decider
  module-billing:
    mayDependOn:
      - platform
      - app-kernel
      # consumes policy.issued via the event bus (JSON contract), not code
  module-claims:
    mayDependOn:
      - platform
      - app-kernel
      - module-policy # consumes policy/ports.Reader to validate cover at FNOL
  module-audit:
    mayDependOn:
      - platform
      - app-kernel
      # subscribes to all events via the bus (SubscribeAll); no module code deps
  module-integration:
    mayDependOn:
      - platform
      - app-kernel
  module-notification:
    mayDependOn:
      - platform
      - app-kernel
      - module-integration # consumes integration/ports.SmsSender
      - module-party       # consumes party/ports.Reader (recipient lookup)
  module-document:
    mayDependOn:
      - platform
      - app-kernel
      - module-party # consumes party/ports.Reader (insured name)
  module-reporting:
    mayDependOn:
      - platform
      - app-kernel
      # projects policy.issued/claims.settled via the bus (JSON contract)
  module-iam:
    mayDependOn:
      - platform
      - app-kernel

# commonComponents may be depended on by anyone (the shared kernel).
commonComponents:
  - platform
