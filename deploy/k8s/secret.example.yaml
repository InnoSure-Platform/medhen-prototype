# Example only — DO NOT commit real values (H5). In production, generate this
# Secret with external-secrets / sealed-secrets from your secret store; never
# check plaintext secrets into git.
#
#   kubectl create secret generic medhen-api-secrets \
#     --from-literal=DATABASE_URL='postgres://medhen_app:<pw>@db:5432/medhen?sslmode=require' \
#     --from-literal=TELEBIRR_WEBHOOK_SECRET='<hmac-secret>' \
#     --from-literal=KEYCLOAK_URL='https://keycloak.example.et' \
#     --from-literal=KEYCLOAK_REALM='medhen' \
#     --from-literal=KEYCLOAK_AUDIENCE='medhen-api'
apiVersion: v1
kind: Secret
metadata:
  name: medhen-api-secrets
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  TELEBIRR_WEBHOOK_SECRET: "REPLACE_ME"
  KEYCLOAK_URL: "REPLACE_ME"
  KEYCLOAK_REALM: "medhen"
  KEYCLOAK_AUDIENCE: "medhen-api"
