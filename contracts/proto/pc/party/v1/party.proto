syntax = "proto3";

package pc.party.v1;

option go_package = "github.com/InnoSure-Platform/pc-contracts/gen/go/party/v1;partyv1";

service PartyService {
  rpc RegisterIndividual(RegisterIndividualRequest) returns (Party);
  rpc GetParty(GetPartyRequest) returns (Party);
  rpc UploadKYC(UploadKYCRequest) returns (KYCDocument);
}

message RegisterIndividualRequest {
  string tenant_id = 1;
  string full_name = 2;
  string full_name_am = 3;
  string phone_e164 = 4;
  string email = 5;
  string date_of_birth = 6; // YYYY-MM-DD
  string gender = 7;
  Address address = 8;
  string idempotency_key = 9;
}

message Address {
  string region = 1;
  string zone = 2;
  string woreda = 3;
  string kebele = 4;
  string line1 = 5;
  string city = 6;
}

message Party {
  string id = 1;
  string tenant_id = 2;
  string party_type = 3;
  string full_name = 4;
  string full_name_am = 5;
  string phone_e164 = 6;
  string email = 7;
  string status = 8;
  Address address = 9;
  string created_at = 10;
}

message GetPartyRequest {
  string tenant_id = 1;
  string party_id = 2;
}

message UploadKYCRequest {
  string tenant_id = 1;
  string party_id = 2;
  string doc_type = 3;
  string file_name = 4;
  bytes content = 5;
}

message KYCDocument {
  string id = 1;
  string party_id = 2;
  string doc_type = 3;
  string status = 4;
  string object_key = 5;
}
