syntax = "proto3";

package pc.policy.v1;

option go_package = "github.com/InnoSure-Platform/pc-contracts/gen/go/policy/v1;policyv1";

service PolicyService {
  rpc CreateQuote(CreateQuoteRequest) returns (Quote);
  rpc GetQuote(GetQuoteRequest) returns (Quote);
  rpc BindQuote(BindQuoteRequest) returns (Policy);
  rpc IssuePolicy(IssuePolicyRequest) returns (Policy);
  rpc GetPolicy(GetPolicyRequest) returns (Policy);
}

message MotorRisk {
  string plate_number = 1;
  string chassis_number = 2;
  string make = 3;
  string model = 4;
  int32 year = 5;
  string usage = 6; // private | commercial
  int64 sum_insured_minor = 7; // ETB cents
  string cover_type = 8; // comprehensive | third_party
}

message CreateQuoteRequest {
  string tenant_id = 1;
  string party_id = 2;
  string product_code = 3;
  MotorRisk risk = 4;
  string locale = 5; // en | am
  string idempotency_key = 6;
}

message PremiumLine {
  string code = 1;
  string label = 2;
  string label_am = 3;
  int64 amount_minor = 4;
}

message Quote {
  string id = 1;
  string tenant_id = 2;
  string party_id = 3;
  string product_code = 4;
  string status = 5;
  MotorRisk risk = 6;
  repeated PremiumLine lines = 7;
  int64 total_minor = 8;
  string currency = 9;
  string uw_decision = 10;
  string expires_at = 11;
  string created_at = 12;
}

message GetQuoteRequest {
  string tenant_id = 1;
  string quote_id = 2;
}

message BindQuoteRequest {
  string tenant_id = 1;
  string quote_id = 2;
  string idempotency_key = 3;
}

message IssuePolicyRequest {
  string tenant_id = 1;
  string policy_id = 2;
  string payment_receipt_id = 3;
  string idempotency_key = 4;
}

message Policy {
  string id = 1;
  string tenant_id = 2;
  string policy_number = 3;
  string quote_id = 4;
  string party_id = 5;
  string product_code = 6;
  string status = 7;
  MotorRisk risk = 8;
  repeated PremiumLine lines = 9;
  int64 total_minor = 10;
  string currency = 11;
  string effective_from = 12;
  string effective_to = 13;
  string issued_at = 14;
}

message GetPolicyRequest {
  string tenant_id = 1;
  string policy_id = 2;
}
